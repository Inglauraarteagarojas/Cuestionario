<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizConf — Drones</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // =====================================================================
  //  INSTRUCCIONES PARA ACTIVAR EL MULTIJUGADOR EN TIEMPO REAL:
  //  1. Ve a https://console.firebase.google.com
  //  2. Crea un nuevo proyecto (gratis)
  //  3. En el proyecto: Build > Realtime Database > Create database (modo test)
  //  4. Ve a Configuracion del proyecto > Tu aplicacion web > Copia los valores
  //  5. Reemplaza los valores de firebaseConfig con los tuyos
  // =====================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyBSfzteh7rBzVgsQ59c5GJHN-0i_Oni3Gc",
    authDomain: "basededatosweblaura.firebaseapp.com",
    databaseURL: "https://basededatosweblaura-default-rtdb.firebaseio.com",
    projectId: "basededatosweblaura",
    storageBucket: "basededatosweblaura.firebasestorage.app",
    messagingSenderId: "495617605491",
    appId: "1:495617605491:web:fb9c845b79ff68631ccf06"
  };

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window._db = db;
    window._fbRef = ref;
    window._fbSet = set;
    window._fbOnValue = onValue;
    window._fbRemove = remove;
    window._fbReady = true;
    console.log("Firebase OK");
    if (window._onFbReady) window._onFbReady();
  } catch(e) {
    window._fbReady = false;
    console.warn("Firebase no configurado:", e.message);
  }
</script>
<style>
  :root {
    --bg: #0d0d1a;
    --card: #16162a;
    --accent: #f72585;
    --blue: #4361ee;
    --green: #06d6a0;
    --yellow: #ffd60a;
    --text: #f0f0ff;
    --muted: #888aaa;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse at 20% 20%,rgba(67,97,238,.15) 0%,transparent 60%),
                radial-gradient(ellipse at 80% 80%,rgba(247,37,133,.12) 0%,transparent 60%);
    pointer-events:none;
  }
  h1,h2,h3 { font-family:'Bebas Neue',cursive; letter-spacing:2px; }

  /* SCREENS */
  .screen { display:none; width:100%; max-width:860px; padding:24px; animation:fadeIn .4s ease; }
  .screen.active { display:flex; flex-direction:column; align-items:center; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  /* HOME */
  .logo { font-size:clamp(52px,10vw,96px); color:var(--accent); text-shadow:0 0 40px rgba(247,37,133,.5); margin-bottom:48px; }

  /* BUTTONS */
  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:14px 36px; border-radius:50px; border:none; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-weight:700; font-size:16px;
    transition:transform .15s, box-shadow .15s;
  }
  .btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .btn:active { transform:translateY(0); }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid #333; }
  .btn-sm { padding:8px 20px; font-size:14px; }

  /* NAME */
  .name-card { background:var(--card); border-radius:var(--radius); padding:40px; width:100%; max-width:480px; text-align:center; }
  .name-card h2 { font-size:36px; margin-bottom:8px; }
  .name-card p { color:var(--muted); margin-bottom:28px; }
  input[type=text] {
    width:100%; padding:14px 20px; border-radius:12px;
    background:#22223a; border:2px solid #333; color:var(--text);
    font-size:18px; font-family:'DM Sans',sans-serif;
    margin-bottom:20px; outline:none; transition:border-color .2s;
  }
  input[type=text]:focus { border-color:var(--accent); }

  /* LOBBY */
  .lobby-header { text-align:center; margin-bottom:16px; }
  .lobby-header h2 { font-size:48px; }
  .fb-status { border-radius:50px; padding:7px 18px; font-size:13px; font-weight:600; margin-bottom:10px; }
  .fb-status.on  { background:rgba(6,214,160,.12); color:var(--green); border:1px solid rgba(6,214,160,.3); }
  .fb-status.off { background:rgba(255,77,109,.1);  color:#ff4d6d;     border:1px solid rgba(255,77,109,.2); }
  .lobby-sub { color:var(--muted); margin-bottom:6px; font-size:15px; }
  .player-count { font-size:13px; color:var(--muted); margin-bottom:24px; }
  .players-grid { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-bottom:32px; min-height:56px; width:100%; }
  .player-chip {
    background:var(--card); border-radius:50px; padding:10px 20px;
    font-weight:700; display:flex; align-items:center; gap:8px;
    animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    border:1px solid #2a2a3e;
  }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; color:#fff; }
  .me-tag { background:var(--accent); color:#fff; border-radius:50px; padding:3px 10px; font-size:11px; font-weight:700; margin-left:4px; }

  /* QUESTION */
  .q-header { width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .q-counter { font-size:14px; color:var(--muted); }
  .timer-ring { position:relative; width:64px; height:64px; }
  .timer-ring svg { transform:rotate(-90deg); }
  .timer-ring circle { fill:none; stroke-width:6; }
  .timer-ring .track { stroke:#333; }
  .timer-ring .fill { stroke:var(--green); transition:stroke-dashoffset .9s linear, stroke .3s; }
  .timer-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',cursive; font-size:22px; }
  .q-card { background:var(--card); border-radius:var(--radius); padding:32px; width:100%; text-align:center; margin-bottom:24px; border:1px solid #2a2a3e; }
  .q-card h2 { font-size:clamp(17px,3.5vw,26px); font-family:'DM Sans',sans-serif; font-weight:700; line-height:1.4; }
  .q-cat { font-size:12px; color:var(--muted); margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
  .answers-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; }
  .ans-btn {
    border:none; border-radius:var(--radius); padding:20px 16px; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-weight:700; font-size:clamp(13px,2vw,15px);
    color:#fff; display:flex; align-items:center; gap:12px;
    transition:transform .15s, filter .15s; text-align:left;
  }
  .ans-btn:hover:not(:disabled) { transform:scale(1.03); filter:brightness(1.15); }
  .ans-btn:disabled { cursor:default; }
  .ans-btn .shape { min-width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.25); }
  .ans-btn:nth-child(1) { background:#e63946; }
  .ans-btn:nth-child(2) { background:#2a9d8f; }
  .ans-btn:nth-child(3) { background:#c07d28; }
  .ans-btn:nth-child(4) { background:var(--blue); }
  .ans-btn.correct { outline:4px solid #06d6a0; animation:pulse .4s; }
  .ans-btn.wrong   { opacity:.4; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  .progress-bar-wrap { width:100%; height:4px; background:#222; border-radius:4px; margin-bottom:28px; overflow:hidden; }
  .progress-bar { height:100%; background:var(--accent); transition:width .4s; border-radius:4px; }

  /* FEEDBACK */
  .fb-card { background:var(--card); border-radius:var(--radius); padding:36px 40px; text-align:center; width:100%; max-width:520px; }
  .fb-icon { font-size:52px; margin-bottom:12px; }
  .fb-msg { font-size:36px; margin-bottom:8px; }
  .fb-pts { font-size:22px; color:var(--yellow); margin-bottom:8px; }
  .fb-ans { color:var(--muted); margin-bottom:24px; font-size:14px; }
  .streak-badge { display:inline-block; background:var(--accent); border-radius:50px; padding:6px 18px; font-size:14px; font-weight:700; margin-bottom:20px; }

  /* LEADERBOARD */
  .lb-title { font-size:52px; margin-bottom:32px; }
  .lb-list { width:100%; max-width:600px; display:flex; flex-direction:column; gap:12px; margin-bottom:32px; }
  .lb-row {
    background:var(--card); border-radius:12px; padding:16px 24px;
    display:flex; align-items:center; gap:16px;
    animation:slideIn .4s ease both; border:1px solid #2a2a3e;
  }
  .lb-row.r1 { background:linear-gradient(135deg,#b8860b,#ffd700); color:#1a1a1a; border:none; }
  .lb-row.r2 { background:linear-gradient(135deg,#777,#bbb);       color:#1a1a1a; border:none; }
  .lb-row.r3 { background:linear-gradient(135deg,#7a3b10,#cd7f32); color:#fff;    border:none; }
  .lb-row.me { box-shadow:0 0 0 2px var(--accent); }
  @keyframes slideIn { from{transform:translateX(-32px);opacity:0} to{transform:translateX(0);opacity:1} }
  .lb-rank { font-family:'Bebas Neue',cursive; font-size:28px; min-width:44px; }
  .lb-name { flex:1; font-weight:700; font-size:18px; }
  .lb-score { font-family:'Bebas Neue',cursive; font-size:28px; }

  @media(max-width:560px) { .answers-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="logo">QUIZCONF</div>
  <button class="btn btn-primary" onclick="goTo('s-name')" style="font-size:20px;padding:18px 60px">Jugar</button>
</div>

<!-- NAME -->
<div class="screen" id="s-name">
  <div class="name-card">
    <h2>COMO TE LLAMAS?</h2>
    <p>Ingresa tu nombre para unirte</p>
    <input type="text" id="playerName" placeholder="Tu nombre aqui..." maxlength="20"
      onkeydown="if(event.key==='Enter')joinGame()"/>
    <button class="btn btn-primary" style="width:100%" onclick="joinGame()">Unirme al juego</button>
    <br><br>
    <button class="btn btn-ghost btn-sm" onclick="goTo('s-home')">Volver</button>
  </div>
</div>

<!-- LOBBY -->
<div class="screen" id="s-lobby">
  <div class="lobby-header"><h2>SALA DE ESPERA</h2></div>
  <div class="fb-status off" id="fb-status">Sin conexion en tiempo real</div>
  <p class="lobby-sub">Esperando jugadores...</p>
  <div class="player-count" id="player-count">0 jugadores conectados</div>
  <div class="players-grid" id="players-grid"></div>
  <button class="btn btn-primary" onclick="startGame()" style="font-size:20px;padding:18px 60px">COMENZAR</button>
  <br>
  <button class="btn btn-ghost btn-sm" onclick="leaveGame()" style="margin-top:16px">Salir</button>
</div>

<!-- QUESTION -->
<div class="screen" id="s-question">
  <div class="q-header">
    <span class="q-counter" id="q-counter">Pregunta 1 de 9</span>
    <div class="timer-ring">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle class="track" cx="32" cy="32" r="28"/>
        <circle class="fill" id="timer-circle" cx="32" cy="32" r="28" stroke-dasharray="175.9" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num" id="timer-num">20</div>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="q-progress"></div></div>
  <div class="q-card">
    <div class="q-cat" id="q-cat">Categoria</div>
    <h2 id="q-text">...</h2>
  </div>
  <div class="answers-grid" id="answers-grid"></div>
</div>

<!-- FEEDBACK -->
<div class="screen" id="s-feedback">
  <div class="fb-card">
    <div class="fb-icon" id="fb-icon">&#9989;</div>
    <div class="fb-msg" id="fb-msg">CORRECTO!</div>
    <div class="fb-pts" id="fb-pts">+1000 puntos</div>
    <div class="streak-badge" id="streak-badge" style="display:none">Racha x2</div>
    <p class="fb-ans" id="fb-ans"></p>
    <button class="btn btn-primary" id="fb-next" onclick="nextQuestion()">Siguiente</button>
  </div>
</div>

<!-- LEADERBOARD MID -->
<div class="screen" id="s-leaderboard">
  <div class="lb-title">CLASIFICACION</div>
  <div class="lb-list" id="lb-list"></div>
  <button class="btn btn-primary" id="lb-next" onclick="continueAfterLB()">Continuar</button>
</div>

<!-- FINAL -->
<div class="screen" id="s-final">
  <div class="lb-title">RESULTADO FINAL</div>
  <div class="lb-list" id="final-list"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px">
    <button class="btn btn-primary" onclick="restartGame()">Jugar de nuevo</button>
    <button class="btn btn-ghost" onclick="goTo('s-home')">Inicio</button>
  </div>
</div>

<script>
const QUESTIONS = [
  { text:"Para que sirve ver el cultivo desde el aire con un dron?", answers:["Detectar problemas que no se ven desde el suelo","Regar las plantas automaticamente","Medir la temperatura del suelo","Fumigar en circulos"], correct:0, cat:"Sobre el Dron" },
  { text:"Que ventaja tiene un dron frente a caminar el lote?", answers:["Cuesta mas dinero","Cubre grandes areas en poco tiempo","Solo funciona de noche","Necesita WiFi para volar"], correct:1, cat:"Sobre el Dron" },
  { text:"Puede el dron ver zonas que desde el suelo no notamos?", answers:["No, el agricultor ve mejor","Si, detecta areas con estres hidrico o plagas ocultas","Solo si el clima esta despejado","Solo en cultivos de maiz"], correct:1, cat:"Sobre el Dron" },
  { text:"El dron reemplaza al agricultor o lo ayuda?", answers:["Lo reemplaza completamente","No tiene relacion con el agricultor","Lo ayuda dandole informacion mas precisa","Solo lo reemplaza en cultivos grandes"], correct:2, cat:"Sobre el Dron" },
  { text:"Si el dron mide la altura total incluyendo arboles y construcciones, eso se llama?", answers:["DTM","DSM","GPS","NDVI"], correct:1, cat:"DSM y DTM" },
  { text:"Si queremos medir solo el suelo sin arboles ni construcciones, usamos:", answers:["DSM","DTM","WiFi","RGB"], correct:1, cat:"DSM y DTM" },
  { text:"Si restamos DSM menos DTM obtenemos:", answers:["La temperatura del cultivo","La altura de los arboles o cultivos","La produccion total del lote","El area de fumigacion"], correct:1, cat:"DSM y DTM" },
  { text:"Cuando marcamos arboles en una imagen para que la IA aprenda, eso se llama:", answers:["Etiquetar (labeling)","Fumigar","Volar alto","Calibrar el GPS"], correct:0, cat:"Deteccion de Objetos" },
  { text:"Para que sirve entrenar un modelo con Roboflow?", answers:["Para cargar la bateria mas rapido","Para volar mas alto","Para detectar arboles automaticamente en imagenes","Para conectarse a internet en el campo"], correct:2, cat:"Deteccion de Objetos" }
];

const COLORS  = ['#f72585','#4361ee','#06d6a0','#ffd60a','#7209b7','#f4a261','#2ec4b6','#e63946','#48cae4','#fb8500'];
const SHAPES  = ['&#9650;','&#9670;','&#9679;','&#9632;'];

const G = {
  name:'', id:null, score:0, streak:0, currentQ:0,
  answered:false, timerInt:null, timeLeft:20,
  allPlayers:[], lobbyOff:null, botsAdded:false
};

/* ── NAV ── */
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ── JOIN ── */
function joinGame() {
  const name = document.getElementById('playerName').value.trim();
  if (!name) { document.getElementById('playerName').focus(); return; }
  G.name = name;
  G.id   = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  G.score = 0; G.streak = 0; G.currentQ = 0; G.botsAdded = false;

  if (window._fbReady) {
    fbJoin(name);
  } else {
    // Try again after a short wait (Firebase module may still be loading)
    setTimeout(() => {
      if (window._fbReady) fbJoin(name);
      else offlineJoin(name);
    }, 1200);
  }
}

function fbJoin(name) {
  const db  = window._db;
  const ref = window._fbRef;
  const set = window._fbSet;

  set(ref(db, `quizconf/lobby/${G.id}`), { name, score:0, streak:0, ts: Date.now() })
    .then(() => {
      setStatus(true);
      // Live listener for lobby
      G.lobbyOff = window._fbOnValue(ref(db,'quizconf/lobby'), snap => {
        const data = snap.val() || {};
        G.allPlayers = Object.entries(data)
          .map(([id, p]) => ({ id, ...p }))
          .sort((a,b) => a.ts - b.ts);
        renderLobby();
      });
      goTo('s-lobby');
    })
    .catch(err => {
      console.warn('Firebase write error:', err);
      offlineJoin(name);
    });
}

function offlineJoin(name) {
  G.allPlayers = [{ id: G.id, name, score:0, streak:0, ts: Date.now() }];
  setStatus(false);
  renderLobby();
  goTo('s-lobby');
}

function setStatus(online) {
  const el = document.getElementById('fb-status');
  if (online) {
    el.textContent = 'Conectado — los jugadores que ingresen apareceran aqui en tiempo real';
    el.className = 'fb-status on';
  } else {
    el.textContent = 'Sin conexion — configura Firebase para multijugador real (ver comentarios en el codigo)';
    el.className = 'fb-status off';
  }
}

function renderLobby() {
  const grid  = document.getElementById('players-grid');
  const count = document.getElementById('player-count');
  const n = G.allPlayers.length;
  count.textContent = `${n} jugador${n!==1?'es':''} conectado${n!==1?'s':''}`;
  grid.innerHTML = '';
  G.allPlayers.forEach((p, i) => {
    const isMe = p.id === G.id;
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.style.animationDelay = (i * 0.07) + 's';
    chip.innerHTML = `<div class="avatar" style="background:${COLORS[i%COLORS.length]}">${p.name[0].toUpperCase()}</div>${p.name}${isMe ? '<span class="me-tag">TU</span>' : ''}`;
    grid.appendChild(chip);
  });
}

function leaveGame() {
  if (window._fbReady && G.id) {
    try { window._fbRemove(window._fbRef(window._db, `quizconf/lobby/${G.id}`)); } catch(e){}
  }
  if (G.lobbyOff) { try { G.lobbyOff(); } catch(e){} G.lobbyOff = null; }
  goTo('s-home');
}

/* ── GAME ── */
function startGame() {
  // Stop live lobby updates during game
  if (G.lobbyOff) { try { G.lobbyOff(); } catch(e){} G.lobbyOff = null; }
  G.currentQ = 0; G.score = 0; G.streak = 0; G.botsAdded = false;
  if (!G.allPlayers.find(p => p.id === G.id)) {
    G.allPlayers.unshift({ id: G.id, name: G.name, score:0, streak:0, ts: Date.now() });
  }
  G.allPlayers.forEach(p => { p.score = 0; p.streak = 0; });
  showQuestion();
}

function showQuestion() {
  if (G.currentQ >= QUESTIONS.length) { showFinal(); return; }
  const q = QUESTIONS[G.currentQ];
  G.answered = false;

  document.getElementById('q-counter').textContent  = `Pregunta ${G.currentQ+1} de ${QUESTIONS.length}`;
  document.getElementById('q-cat').textContent       = q.cat;
  document.getElementById('q-text').textContent      = q.text;
  document.getElementById('q-progress').style.width  = ((G.currentQ/QUESTIONS.length)*100)+'%';

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.answers.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = `<div class="shape">${SHAPES[i]}</div>${a}`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  clearInterval(G.timerInt);
  G.timeLeft = 20;
  updateTimer(20, 20);
  G.timerInt = setInterval(() => {
    G.timeLeft--;
    updateTimer(G.timeLeft, 20);
    if (G.timeLeft <= 0) { clearInterval(G.timerInt); timeOut(); }
  }, 1000);

  goTo('s-question');
}

function updateTimer(t, max) {
  document.getElementById('timer-num').textContent = t;
  const c = document.getElementById('timer-circle');
  c.style.strokeDashoffset = 175.9 * (1 - t/max);
  c.style.stroke = t>10 ? '#06d6a0' : t>5 ? '#ffd60a' : '#f72585';
}

function selectAnswer(idx) {
  if (G.answered) return;
  G.answered = true;
  clearInterval(G.timerInt);

  const q = QUESTIONS[G.currentQ];
  document.querySelectorAll('.ans-btn').forEach((b, i) => {
    b.disabled = true;
    b.classList.add(i===q.correct ? 'correct' : 'wrong');
  });

  const ok = idx === q.correct;
  let pts = 0;
  if (ok) {
    G.streak++;
    pts = Math.round(1000 * (G.timeLeft/20) * (G.streak>1 ? 1.5 : 1));
    G.score += pts;
    const me = G.allPlayers.find(p => p.id === G.id);
    if (me) { me.score = (me.score||0)+pts; me.streak = (me.streak||0)+1; }
    // Sync score to Firebase
    if (window._fbReady && G.id) {
      try { window._fbSet(window._fbRef(window._db, `quizconf/lobby/${G.id}/score`), G.score); } catch(e){}
    }
  } else {
    G.streak = 0;
    const me = G.allPlayers.find(p => p.id === G.id);
    if (me) me.streak = 0;
  }

  // Add simulated rivals if playing solo
  if (!G.botsAdded && G.allPlayers.filter(p=>!p.isBot).length === 1) {
    G.botsAdded = true;
    ['Camila','Andres','Sofia'].forEach(n =>
      G.allPlayers.push({ id:'bot_'+n, name:n, score:0, streak:0, isBot:true }));
  }
  G.allPlayers.filter(p=>p.isBot).forEach(p => {
    if (Math.random()<0.6) p.score = (p.score||0)+Math.round(500+Math.random()*500);
  });

  showFeedback(ok, pts, q.answers[q.correct]);
}

function timeOut() {
  if (G.answered) return;
  G.answered = true; G.streak = 0;
  const q = QUESTIONS[G.currentQ];
  document.querySelectorAll('.ans-btn').forEach((b,i) => {
    b.disabled=true; b.classList.add(i===q.correct?'correct':'wrong');
  });
  G.allPlayers.filter(p=>p.isBot).forEach(p => {
    if (Math.random()<0.6) p.score=(p.score||0)+Math.round(300+Math.random()*400);
  });
  showFeedback(false, 0, q.answers[q.correct]);
}

function showFeedback(ok, pts, correctAnswer) {
  document.getElementById('fb-icon').innerHTML = ok ? '&#9989;' : '&#10060;';
  document.getElementById('fb-msg').textContent = ok ? 'CORRECTO!' : 'INCORRECTO';
  document.getElementById('fb-msg').style.color = ok ? 'var(--green)' : 'var(--accent)';
  document.getElementById('fb-pts').textContent = ok ? `+${pts} puntos` : '0 puntos';
  document.getElementById('fb-ans').textContent = `Respuesta: ${correctAnswer}`;
  const sb = document.getElementById('streak-badge');
  if (G.streak>1 && ok) { sb.style.display='inline-block'; sb.textContent=`Racha x${G.streak}`; }
  else sb.style.display='none';
  const isLast = G.currentQ === QUESTIONS.length-1;
  document.getElementById('fb-next').textContent = isLast ? 'Ver Resultados' : 'Siguiente';
  goTo('s-feedback');
}

function nextQuestion() {
  G.currentQ++;
  if (G.currentQ >= QUESTIONS.length) { showFinal(); return; }
  if (G.currentQ % 3 === 0) { showLeaderboard(false); return; }
  showQuestion();
}

function showLeaderboard(isFinal) {
  const sorted = [...G.allPlayers].sort((a,b)=>(b.score||0)-(a.score||0));
  const list = document.getElementById('lb-list');
  list.innerHTML = '';
  sorted.forEach((p,i) => {
    const me = p.id === G.id;
    const row = document.createElement('div');
    row.className = `lb-row${i===0?' r1':i===1?' r2':i===2?' r3':''}${me?' me':''}`;
    row.style.animationDelay = (i*.1)+'s';
    row.innerHTML = `<div class="lb-rank">${i+1}</div><div class="lb-name">${p.name}${me?' <small style="opacity:.6">(tu)</small>':''}</div><div class="lb-score">${(p.score||0).toLocaleString()}</div>`;
    list.appendChild(row);
  });
  document.getElementById('lb-next').textContent = isFinal ? 'Fin' : 'Continuar';
  goTo('s-leaderboard');
}

function continueAfterLB() {
  if (G.currentQ >= QUESTIONS.length) showFinal(); else showQuestion();
}

function showFinal() {
  const sorted = [...G.allPlayers].sort((a,b)=>(b.score||0)-(a.score||0));
  const list = document.getElementById('final-list');
  list.innerHTML = '';
  sorted.forEach((p,i) => {
    const me = p.id === G.id;
    const row = document.createElement('div');
    row.className = `lb-row${i===0?' r1':i===1?' r2':i===2?' r3':''}${me?' me':''}`;
    row.style.animationDelay = (i*.1)+'s';
    row.innerHTML = `<div class="lb-rank">${i+1}</div><div class="lb-name">${p.name}${me?' <small style="opacity:.6">(tu)</small>':''}</div><div class="lb-score">${(p.score||0).toLocaleString()}</div>`;
    list.appendChild(row);
  });
  if (window._fbReady && G.id) {
    try { window._fbRemove(window._fbRef(window._db, `quizconf/lobby/${G.id}`)); } catch(e){}
  }
  goTo('s-final');
}

function restartGame() {
  G.allPlayers = G.allPlayers.filter(p=>!p.isBot);
  G.allPlayers.forEach(p => { p.score=0; p.streak=0; });
  G.botsAdded = false;
  // Re-register in Firebase lobby
  if (window._fbReady && G.id) {
    try {
      window._fbSet(window._fbRef(window._db,`quizconf/lobby/${G.id}`), { name:G.name, score:0, streak:0, ts:Date.now() });
      const ref = window._fbRef;
      G.lobbyOff = window._fbOnValue(ref(window._db,'quizconf/lobby'), snap => {
        const data = snap.val()||{};
        G.allPlayers = Object.entries(data).map(([id,p])=>({id,...p})).sort((a,b)=>a.ts-b.ts);
        renderLobby();
      });
    } catch(e){}
  }
  renderLobby();
  goTo('s-lobby');
}

// Handle delayed Firebase load
window._onFbReady = function() { console.log("Firebase modulo listo"); };
</script>
</body>
</html>
